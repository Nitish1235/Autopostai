# Cloud Build config — builds and deploys both services to Cloud Run
# Trigger this from Cloud Build console → Connect Repository → main branch

steps:
  # ── Step 0: Run Prisma migrations ────────────────────
  # Pushes schema to Cloud SQL before deploying new images.
  # Only _DATABASE_URL needs to be set in the Cloud Build trigger.
  # DIRECT_URL = DATABASE_URL because Cloud SQL has no pgbouncer pooler.
  - name: 'node:20'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apt-get update -y && apt-get install -y openssl
        npm install --prefix /tmp/prisma-cli prisma@5 --no-save
        /tmp/prisma-cli/node_modules/.bin/prisma db push --schema=./prisma/schema.prisma --skip-generate
    env:
      - 'DATABASE_URL=${_DATABASE_URL}'
      - 'DIRECT_URL=${_DATABASE_URL}'

  # ── Step 1: Build the Next.js web app image ──────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}'
      - '-f'
      - 'docker/Dockerfile'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web:latest'
      - '.'

  # ── Step 2: Build the worker image ───────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.worker'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker:latest'
      - '.'

  # ── Step 3: Push web image ───────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web'

  # ── Step 4: Push worker image ────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker'

  # ── Step 5: Deploy web to Cloud Run ──────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'autopost-web'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--timeout'
      - '300'
      - '--allow-unauthenticated'

  # ── Step 6: Deploy worker to Cloud Run ───────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'autopost-worker'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '600'
      - '--no-allow-unauthenticated'

# Substitution variables — set these in Cloud Build trigger config
# IMPORTANT: Set _DATABASE_URL in the trigger UI, never commit credentials here!
substitutions:
  _REGION: us-central1
  _REPO: autopost-ai
  _DATABASE_URL: ''     # Set in Cloud Build trigger → Add substitution
  _NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ''  # Clerk frontend key

# Push images to Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
