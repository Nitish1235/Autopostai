# Cloud Build config — builds and deploys both services to Cloud Run
# Trigger this from Cloud Build console → Connect Repository → main branch

steps:
  # ── Step 0: Run Prisma migrations ────────────────────
  # Downloads the Cloud SQL Auth Proxy, starts it in the background to
  # create the unix socket, then runs `prisma db push` to sync the schema.
  # Cloud Build's service account must have `roles/cloudsql.client` IAM role.
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        apt-get update -y && apt-get install -y openssl wget

        # Download Cloud SQL Auth Proxy v2
        wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64 \
          -O /usr/local/bin/cloud-sql-proxy
        chmod +x /usr/local/bin/cloud-sql-proxy

        # Create socket directory and start proxy in background
        mkdir -p /cloudsql
        /usr/local/bin/cloud-sql-proxy --unix-socket /cloudsql ${_CLOUDSQL_INSTANCE} &
        PROXY_PID=$!
        echo "Cloud SQL Proxy started (PID $PROXY_PID), waiting for socket..."
        sleep 5

        # Install Prisma and push schema
        npm install --prefix /tmp/prisma-cli prisma@5 --no-save
        /tmp/prisma-cli/node_modules/.bin/prisma db push \
          --schema=./prisma/schema.prisma \
          --skip-generate

        kill $PROXY_PID
        echo "Migration complete."
    env:
      - 'DATABASE_URL=${_DATABASE_URL}'
      - 'DIRECT_URL=${_DATABASE_URL}'

  # ── Step 1: Build the Next.js web app image ──────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}'
      - '-f'
      - 'docker/Dockerfile'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web:latest'
      - '.'

  # ── Step 2: Build the worker image ───────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.worker'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker:latest'
      - '.'

  # ── Step 3: Push web image ───────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web'

  # ── Step 4: Push worker image ────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker'

  # ── Step 5: Deploy web to Cloud Run ──────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'autopost-web'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--timeout'
      - '300'
      - '--allow-unauthenticated'
      - '--set-cloudsql-instances'
      - '${_CLOUDSQL_INSTANCE}'

  # ── Step 6: Deploy worker to Cloud Run ───────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'autopost-worker'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '600'
      - '--no-allow-unauthenticated'
      - '--set-cloudsql-instances'
      - '${_CLOUDSQL_INSTANCE}'

# Substitution variables — set these in the Cloud Build trigger UI.
# NEVER commit real values here.
substitutions:
  _REGION: us-central1
  _REPO: autopost-ai
  _CLOUDSQL_INSTANCE: ''  # e.g. autopostai-489407:us-central1:autopost-db
  _DATABASE_URL: ''       # postgresql://user:pass@/dbname?host=/cloudsql/project:region:instance
  _NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ''  # Clerk frontend key

# Push images to Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-web'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/autopost-worker'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
