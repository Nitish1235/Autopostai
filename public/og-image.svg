<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D11"/>
  
  <!-- Subtle glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>
  
  <!-- Logo icon -->
  <rect x="420" y="140" width="100" height="100" rx="20" fill="#1C1C22"/>
  <text x="435" y="215" font-family="Arial Black, sans-serif" font-weight="800" font-size="52" fill="#FFFFFF">A</text>
  <text x="475" y="215" font-family="Arial Black, sans-serif" font-weight="800" font-size="52" fill="#3B82F6">P</text>
  <rect x="435" y="225" width="70" height="5" rx="2.5" fill="#3B82F6"/>
  
  <!-- Wordmark -->
  <text x="535" y="210" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="40" fill="#FFFFFF">AutoPost </text>
  <text x="755" y="210" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="40" fill="#3B82F6">AI</text>
  
  <!-- Tagline -->
  <text x="600" y="350" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.5)" text-anchor="middle">Faceless Video on Autopilot</text>
  
  <!-- Features -->
  <text x="600" y="420" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">AI Video Generation • Auto-Publish • TikTok • Instagram • YouTube • X</text>
  
  <!-- Bottom accent line -->
  <rect x="450" y="480" width="300" height="2" rx="1" fill="#3B82F6" opacity="0.4"/>
</svg>
